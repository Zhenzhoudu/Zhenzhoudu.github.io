<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dong 的个人介绍</title>
  <style>
    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7ff, #eef4ff);
      color: #233;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 32px 28px;
      max-width: 580px;
      width: 100%;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: #2f4f4f;
    }
    .tag {
      display: inline-block;
      margin: 8px 0 16px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eaf2ff;
      color: #3b6fd8;
      font-size: 14px;
    }
    p {
      line-height: 1.8;
      margin: 10px 0;
      color: #4b5563;
    }
    .info {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>你好，我是 dong</h1>
    <div class="tag">热爱学习 · 喜欢创造</div>
    <p>这是一个简洁的个人介绍页面，记录着我对生活和技术的热情。</p>
    <p>我喜欢不断学习新知识，也希望通过努力把想法变成实际的作品。</p>
    <div class="info">
      <p><strong>兴趣：</strong>编程、阅读、思考、探索新事物</p>
      <p><strong>目标：</strong>保持成长，持续进步，做更好的自己</p>
    </div>
  </div>
</body>
</html>
